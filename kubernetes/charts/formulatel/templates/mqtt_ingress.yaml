{{- if .Values.mqtt_ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "formulatel.fullname" . }}-mqtt-ingress
  namespace: {{ .Values.global.namespace }}
  {{- if .Values.ssl.enabled }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ssl.cluster_issuer }}
    traefik.ingress.kubernetes.io/router.middlewares: formulatel-redirect-https@kubernetescrd
  {{- end}}
spec:
  ingressClassName: traefik
  {{- if .Values.ssl.enabled }}
  tls:
    - hosts:
        - {{ .Values.mqtt_ingress.hostname }}
      secretName: mqtt-tls-cert
  {{- end}}
  rules:
    - host: {{ .Values.mqtt_ingress.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.mqtt_ingress.service_name }}
                port:
                  number: {{ .Values.mqtt_ingress.port }}
{{- end}}