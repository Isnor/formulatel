apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: formulatel-mosquitto-network-guard
  namespace: formulatel
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: formulatel-mosquitto
  policyTypes:
    - Ingress
  ingress:
    # Allow persist and grafana service to connect to the anonymous raw MQTT port
    - from:
        - podSelector:
            matchLabels:
              app: persist
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 1883

    - ports:
        - protocol: TCP
          port: 9001