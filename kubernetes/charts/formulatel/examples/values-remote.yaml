# this is an example of a values.yaml that can be used to deploy a more production-like
# environment (SSL enabled, MQTT auth enabled, references some resources that need to be
# deployed irrespective of this chart)

global:
  namespace: formulatel

db:
  name: formulatel

# persist config
persist:
  tag: 0.1.0
  replicas: 2
  mqtt_broker: 'tcp://formulatel-mosquitto:1883'

# db-migrate
migrate:
  enabled: true
  tag: 0.1.0
  db_secret_name: formulatel-db-secrets

ssl:
  enabled: true
  cluster_issuer: formulatel-formulatel-letsencrypt-issuer

# grafana_ingress sets up an Ingress to allow web traffic into our `formulatel-grafana` service
grafana_ingress:
  enabled: true
  hostname: dashboard.formula.tel # host to route requests from
  port: 80 # port that Grafana exposes
  service_name: formulatel-grafana # name of the grafana service deployed in the cluster

mqtt_ingress:
  enabled: true
  hostname: mqtt.formula.tel # host to route requests from
  port: 9001 # websocket port of mosquitto
  service_name: formulatel-mosquitto # name of the mqtt broker service deployed in the cluster

# sub-chart values

grafana:
  plugins:
    - grafana-mqtt-datasource

  persistence:
    enabled: true

  # creates the admin user using an existing secret; this chart _does not_ create secrets
  admin:
    existingSecret: "formulatel-grafana-admin"
    userKey: username
    passwordKey: password

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: formulatel_mqtt
          type: grafana-mqtt-datasource
          jsonData:
            uri: "tcp://formulatel-mosquitto:1883"
            tlsAuth: false
            clientID: formulatel_grafana
            isDefault: true

  grafana.ini:
    database:
      type: postgres
      ssl_mode: disable
      instrument_queries: true
      host: '10.0.1.38:5432'
      name: grafana
      # log_queries: true

  # this secret needs to be created
  envValueFrom:
    GF_DATABASE_USER:
      secretKeyRef:
        name: formulatel-db-user-grafana-admin
        key: username

    GF_DATABASE_PASSWORD:
      secretKeyRef:
        name: formulatel-db-user-grafana-admin
        key: password


app-template:
  controllers:
    mosquitto:
      initContainers:
        config-renderer:
          env:
            - name: MOSQUITTO_DB_USERNAME
              valueFrom:
                # this secret needs to be created
                secretKeyRef:
                  name: formulatel-db-user-mosquitto-broker
                  key: username
            - name: MOSQUITTO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: formulatel-db-user-mosquitto-broker
                  key: password

  configMaps:
    mosquitto-template:
      enabled: true
      data:
        mosquitto.conf.tmpl: |
          persistence true
          persistence_location /mosquitto/data/
          autosave_interval 1800
          per_listener_settings true

          listener 1883 0.0.0.0
          protocol mqtt
          allow_anonymous true

          listener 9001 0.0.0.0
          protocol websockets
          allow_anonymous false

          # Plugin Binding
          auth_plugin /mosquitto/go-auth.so
          auth_opt_log_level debug
          auth_opt_backends postgres

          # Postgres Integration
          auth_opt_pg_host 10.0.1.38
          auth_opt_pg_port 5432
          auth_opt_pg_dbname formulatel
          auth_opt_pg_user ${MOSQUITTO_DB_USERNAME}
          auth_opt_pg_password ${MOSQUITTO_DB_PASSWORD}
          auth_opt_pg_sslmode disable

          # Queries
          auth_opt_pg_userquery SELECT password_hash FROM auth.accounts WHERE username = $1 LIMIT 1
          auth_opt_pg_superquery SELECT COUNT(*) FROM auth.accounts WHERE username = $1 AND is_admin = true
          auth_opt_pg_aclquery SELECT topic FROM auth.mqtt_acls JOIN auth.accounts ON mqtt_acls.account_id=accounts.id WHERE username = $1 AND (access_level >= $2)
          auth_opt_hasher bcrypt