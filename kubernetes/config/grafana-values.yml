grafana.ini:
  auth.anonymous:
    enabled: true
    org_role: Admin

plugins:
  - grafana-mqtt-datasource

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: formulatel_mqtt
        type: grafana-mqtt-datasource
        jsonData:
          uri: "tcp://mosquitto:1883"
          tlsAuth: false
          clientID: formulatel_grafana
          isDefault: true
      - name: formulatel_psql
        type: postgres
        url: timescaledb:5432
        user: postgres
        secureJsonData:
          password: 'postgres'
        jsonData:
          database: postgres
          sslmode: 'disable' # disable/require/verify-ca/verify-full
          maxOpenConns: 100
          maxIdleConns: 100
          maxIdleConnsAuto: true
          connMaxLifetime: 14400
          postgresVersion: 1800
          timescaledb: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'formulatel'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/formulatel

dashboards:
  formulatel:
    live:
      json: "" # TODO: same hack as above. Have we tried using the Grafana k8s resource type?
