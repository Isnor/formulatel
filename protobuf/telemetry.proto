syntax = "proto3";
package formulatel;

import "google/protobuf/timestamp.proto";
// this file is concerned with the models that the backend will store, and is an attempt
// to represent vehicle data in a standard way that works for multiple titles

option go_package = "internal/genproto";

// TODO: this an old idea that might be interesting if a) there was a grafana plugin
// for reading from grpc streams; or b) we wanted to build such a plugin
// service VehicleTelemetryService {
//   rpc SendGameTelemetry (stream GameTelemetry) returns (TelemetryAck) {};
// }

// message TelemetryAck {};

// GameTelemetry is a message containing information attached to each chartable metric to allow backend
// time-series data to be aggregated consistently between titles
message GameTelemetry {
  GameTitle title = 1;
  // how would we, from ingest or otherwise, create a session ID? could/should we use an IP address? UDP doesn't really have a "connection",
  // so maybe for now we'll rely on the title to give us a session ID.
  string session_id = 2;
  string user_id = 3; // identify the user/vehicle within the session
  google.protobuf.Timestamp timestamp = 4;

  // should we do this, or have a different message for each type of telemetry?
  // on one hand, we'd only need one RPC, but on the other we can't scale each service
  // independently because there's only one instead of one per packet type
  oneof data {
    VehicleData vehicle_data = 11;
    MotionData motion_data = 12;
    LapTimesData lap_times_data = 13;
    // SessionData, etc.
  }
}

// this message is for any onboard telemetry from the vehicle, generally seen by the driver via a dashboard, screen, or MFD
message VehicleData {
  uint32 speed = 1;
  uint32 rpm = 2;
  float throttle = 3;
  float brake = 4;
  float steering = 5;
  int32 gear = 6;
  uint32 engine_temperature = 7;

  message Tires {
    TireData front_left = 1;
    TireData front_right = 2;
    TireData back_left = 3;
    TireData back_right = 4;
  }

  Tires tires = 12;
}

// this message describes tire information, such as temperature, and pressure.
message TireData {
  uint32 brake_temperature = 1;
  uint32 inner_temperature = 2;
  uint32 surface_temperature = 3;
  uint32 pressure = 4;

  // SurfaceType surface = 13;
}

// this message describes physics data for the vehicle, including position, velocity, and forces.
message MotionData {
  // Position in world space (metres)
  float positionX = 1;
  float positionY = 2;
  float positionZ = 3;

  // Velocity in world space (metres/s)
  float velocityX = 4;
  float velocityY = 5;
  float velocityZ = 6;

  // G-Force components
  float gForceLateral = 7;
  float gForceLongitudinal = 8;
  float gForceVertical = 9;

  // Rotation angles (radians)
  float yaw = 10;
  float pitch = 11;
  float roll = 12;

  // TODO: add direction? it seems like we have that already with rotation
}

// this message describes lap time and race state data for all cars in a session
message LapTimesData {
  uint32 lap_time = 1;
  uint32 current_lap_time = 2;
  uint32 sector1_time = 3;
  uint32 sector2_time = 4;
  uint32 sector3_time = 5;
  uint32 delta_to_car_in_front = 6;
  uint32 delta_to_race_leader = 7;
  float lap_distance = 8;
  float total_distance = 9;
  uint32 car_position = 10;
  uint32 current_lap_num = 11;
  uint32 grid_position = 12;
  uint32 pit_status = 13;
  uint32 num_pit_stops = 14;
  uint32 driver_status = 15;
  uint32 result_status = 16;
  uint32 pit_lane_timer_active = 17;
  float pit_lane_time = 18;
}

enum GameTitle {
  GAME_TITLE_UNKNOWN = 0;

  GAME_TITLE_F123 = 1;
}

