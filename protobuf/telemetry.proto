syntax = "proto3";
package formulatel;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// this file is concerned with the models that the backend will store, and is an attempt
// to represent vehicle data in a standard way that works for multiple titles

option go_package = "internal/genproto";

// TODO: this an old idea that might be interesting if a) there was a grafana plugin
// for reading from grpc streams; or b) we wanted to build such a plugin
// service VehicleTelemetryService {
//   rpc SendGameTelemetry (stream GameTelemetry) returns (TelemetryAck) {};
// }

// message TelemetryAck {};

// GameTelemetry is a message containing information attached to each chartable metric to allow backend
// time-series data to be aggregated consistently between titles
message GameTelemetry {
  GameTitle title = 1;
  // how would we, from ingest or otherwise, create a session ID? could/should we use an IP address? UDP doesn't really have a "connection",
  // so maybe for now we'll rely on the title to give us a session ID.
  string session_id = 2;
  string user_id = 3; // identify the user/vehicle within the session
  google.protobuf.Timestamp timestamp = 4;

  oneof data {
    VehicleData vehicle_data = 11;
    MotionData motion_data = 12;
    CurrentLapData current_lap_data = 13;
    HistoricLapData lap_times_data = 14;
    ExtendedFourWheelData wheel_data = 15;
  }
}

// this message is for any onboard telemetry from the vehicle, generally seen by the driver
// via a dashboard, screen, or MFD
message VehicleData {
  uint32 speed = 1;
  uint32 rpm = 2;
  float throttle = 3;
  float brake = 4;
  float steering = 5;
  int32 gear = 6;
  uint32 engine_temperature = 7;

  message Tires {
    TireData front_left = 1;
    TireData front_right = 2;
    TireData back_left = 3;
    TireData back_right = 4;
  }

  Tires tires = 12;
}

// this message describes tire information, such as temperature, and pressure.
message TireData {
  uint32 brake_temperature = 1;
  uint32 inner_temperature = 2;
  uint32 surface_temperature = 3;
  uint32 pressure = 4;

  // SurfaceType surface = 13;
  // CompoundType compound = 14; // c0, c1, ... cN is fine for F1, but what about GT3, stock, rally, etc.?
}

// WheelData contains universal wheel-level data common across racing sims
// All fields are required (non-optional) for consistency
message ExtendedWheelData {
  float wheel_speed = 1;                // m/s
  float vertical_force = 2;             // N (downforce)
  float slip_angle = 3;                 // radians -
  float slip_ratio = 4;                 // 0-1
  float lateral_force = 5;              // N
  float longitudinal_force = 6;         // N
  float suspension_position = 7;        // m
  float suspension_velocity = 8;        // m/s
}

// ExtendedFourWheelData packages four ExtendedWheelData messages in a "standard" 4-wheel layout
// common to almost all race cars. This exists to give us the potential to support titles with
// vehicle that have, for example, 8 wheels by defining a new message to describe the placement
// of those wheels
message ExtendedFourWheelData {
  ExtendedWheelData back_left = 1;
  ExtendedWheelData back_right = 2;
  ExtendedWheelData front_left = 3;
  ExtendedWheelData front_right = 4;
}

// this message describes physics data for the vehicle, including position, velocity, and forces.
message MotionData {
  // Position in world space (metres)
  float position_x = 1;
  float position_y = 2;
  float position_z = 3;

  // Velocity in world space (metres/s)
  float velocity_x = 4;
  float velocity_y = 5;
  float velocity_z = 6;

  // G-Force components
  float g_force_lateral = 7;
  float g_force_longitudinal = 8;
  float g_force_vertical = 9;

  // Rotation angles (radians)
  float yaw = 10;
  float pitch = 11;
  float roll = 12;

  // TODO: add direction? it seems like we have that already with rotation
}

// this message describes current lap time and race state data
message CurrentLapData {
  // uint32 lap_time = 1;
  uint32 lap_num = 1; // number of the current lap
  uint32 lap_time = 2; // time since the beginning of current lap
  uint32 sector = 3; // 1, 2, or 3; 0 if the track does not have sectors
  uint32 sector1_time = 4;
  uint32 sector2_time = 5;
  // sector3_time is always current_lap_time - sector1_time - sector2_time
  uint32 delta_to_car_in_front = 6;
  uint32 delta_to_race_leader = 7;
  float lap_distance = 8;
  float total_distance = 9;
}

message HistoricLapData {
  uint32 lap_num = 1;
  optional google.protobuf.Duration lap_time = 3;
  optional google.protobuf.Duration sector1_time = 4;
  optional google.protobuf.Duration sector2_time = 5;
  optional google.protobuf.Duration sector3_time = 6;
  bool lap_valid = 7;
  bool sector1_valid = 8;
  bool sector2_valid = 9;
  bool sector3_valid = 10;
}

enum GameTitle {
  GAME_TITLE_UNKNOWN = 0;

  GAME_TITLE_F123 = 1;
}

