name: Build and Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated list of images to build (migrations,persist,all)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_MIGRATIONS: formulatel/timescaledb-migrations
  IMAGE_NAME_PERSIST: formulatel/persist

permissions:
  contents: read
  packages: write

jobs:
  build-migrations:
    if: contains(github.event.inputs.images, 'migrations') || github.event.inputs.images == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push migrations image
        uses: docker/build-push-action@v5
        with:
          context: migrations
          file: migrations.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME_MIGRATIONS }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME_MIGRATIONS }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-persist:
    if: contains(github.event.inputs.images, 'persist') || github.event.inputs.images == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push persist image
        uses: docker/build-push-action@v5
        with:
          file: formulatel/persist.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME_PERSIST }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME_PERSIST }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
