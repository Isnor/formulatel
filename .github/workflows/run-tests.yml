name: Run Formulatel Tests

on:
  pull_request:
    paths:
      - 'formulatel/**'
      - 'migrations/**'
  push:
    branches:
      - main
    tags:
      - v*

env:
  TESTCONTAINERS_RYUK_DISABLED: true
  DOCKER_BUILDKIT: 1
  TESTCONTAINERS_RYUK_DOCKER_HOST_OVERRIDE: unix:///var/run/docker.sock

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Set up Docker Buildx with DIND
        uses: docker/setup-buildx-action@v4

      - name: Cache Go build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            /tmp/go
            ~/go
          key: ${{ runner.os }}-go-build-${{ hashFiles('formulatel/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Install Go tools
        run: |
          cd formulatel
          # Install govulncheck for vulnerability scanning
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run tests
        run: |
          cd formulatel
          # Clean test cache and run all tests
          go clean -testcache
          go test -v -race -count=1 \
            -timeout=5m \
            -parallel=4 \
            ./...

      - name: Archive coverage
        run: make coverage
        continue-on-error: true

      - name: Upload coverage to Coveralls
        if: always()
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: formulatel/coverage.out
          flag-name: coverage-${{ github.sha }}

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            formulatel/coverage.out

      - name: Check for vulnerabilities
        run: |
          cd formulatel
          echo "Checking for known Go vulnerabilities..."
          # Run govulncheck with suggestions for updating vulnerable dependencies
          govulncheck ./... 2>&1 || true
          echo "Vulnerability check complete."

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            formulatel/**/*_test.log
            formulatel/**/*_test.go
            formulatel/coverage.html
