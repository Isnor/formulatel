name: Build and Push Images

on:
  pull_request:
    paths:
      - 'formulatel/**'
      - 'migrations/**'
      - '.github/workflows/**'
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  IMAGE_NAME_DB_MIGRATIONS: timescaledb-migrations
  IMAGE_NAME_PERSIST: persist

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: "persist"
            build_context: "./formulatel"
            dockerfile: "formulatel/persist.Dockerfile"
          - image_name: "timescaledb-migrations"
            build_context: "."
            dockerfile: "migrations.Dockerfile"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,enable=true
            type=semver,pattern={{version}}

      - name: Build and push persist image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
